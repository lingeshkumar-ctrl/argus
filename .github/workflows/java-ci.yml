name: Java CI (Enterprise Services)

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'services/**/*-java/**'
      - '.github/workflows/java-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          
      - name: Verify Environment
        run: mvn -version