name: Python CI (Data & Intel)

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'services/**/*-py/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  security_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit pytest

      - name: Run Bandit (SAST)
        # We will point this at the specific services once code exists
        run: bandit -r ./services/vuln-assessment-py -f custom || true